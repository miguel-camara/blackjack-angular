<div class="flex justify-center w-full bg-green-950">
  <div class="flex flex-col my-2 sm:w-2xl md:w-3xl lg:w-4xl px-8 pt-6 pb-4">
    <div class="flex flex-wrap justify-center gap-5">
      <button
        class="btn bg-green-900 rounded-lg hover:scale-103 transition-transform duration-200"
        (click)="newGame()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M4.616 17q-.691 0-1.153-.462T3 15.385v-6.77q0-.69.463-1.152T4.615 7h14.77q.69 0 1.152.463T21 8.616v6.769q0 .69-.463 1.153T19.385 17zm0-1h14.769q.23 0 .423-.192t.192-.423v-6.77q0-.23-.192-.423T19.385 8H4.615q-.23 0-.423.192T4 8.616v6.769q0 .23.192.423t.423.192M7.5 14.5h1v-2h2v-1h-2v-2h-1v2h-2v1h2zm7.707-.293q.293-.294.293-.707t-.293-.707t-.707-.293t-.707.293t-.293.707t.293.707t.707.293t.707-.293m3-3q.293-.293.293-.707t-.293-.707T17.5 9.5t-.707.293t-.293.707t.293.707t.707.293t.707-.293M4 16V8z"
          />
        </svg>
        Nuevo Juego
      </button>
      <button
        class="btn bg-blue-900 rounded-lg hover:scale-103 transition-transform duration-200"
        (click)="getCard(0)"
        [disabled]="!isDisabled()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="m12.34 12.192l1.93-1.163l1.928 1.163l-.523-2.196l1.712-1.475l-2.24-.186l-.878-2.066l-.877 2.066l-2.24.186l1.712 1.475zm4.514 6.27h1.485q-.002.361-.245.617t-.61.317L6.182 20.817q-.671.087-1.2-.32q-.527-.407-.608-1.078l-1.23-9.713q-.08-.672.333-1.216t1.085-.606l.977-.073v1l-.823.068q-.27.019-.424.221t-.115.471l1.196 9.713q.039.27.23.424q.193.153.463.115zm-7.7-2q-.69 0-1.153-.463t-.462-1.153V4.616q0-.691.462-1.153T9.154 3h10.23q.691 0 1.153.463T21 4.616v10.23q0 .69-.463 1.153t-1.153.463zm0-1h10.23q.27 0 .443-.173t.173-.443V4.616q0-.27-.173-.443T19.385 4H9.154q-.27 0-.442.173q-.173.173-.173.443v10.23q0 .27.173.443t.442.173M5.45 19.9"
          />
        </svg>
        Pedir Carta
      </button>
      <button
        class="btn bg-red-900 rounded-lg hover:scale-103 transition-transform duration-200"
        [disabled]="players().at(0)?.score === 0 || !isDisabled()"
        (click)="computerShift()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12.57 22q-1.936 0-3.62-.928t-2.72-2.584l-3.8-6.107l.303-.302q.269-.275.641-.312t.684.177L8 14.556V5q0-.194.143-.347T8.5 4.5q.194 0 .347.153T9 5v6.5h2.673V3q0-.194.143-.347q.144-.153.357-.153t.357.153t.143.347v8.5h2.673V4q0-.194.144-.347q.143-.153.356-.153q.214 0 .357.153t.143.347v7.5H19v-6q0-.194.143-.347Q19.287 5 19.5 5q.194 0 .347.153T20 5.5v9.089q0 3.098-2.166 5.254Q15.667 22 12.569 22"
          />
        </svg>
        Detener
      </button>
    </div>
    @for (play of players(); track play.name) {
      <div class="flex justify-center my-5">
        <strong class="text-2xl">{{ play.name }}:</strong>
        <span class="text-2xl italic ml-1"> {{ play.score }} </span>
      </div>
      <div
        class="flex flex-wrap w-full px-5 mb-5"
        [class.justify-around]="isToggle()"
        (click)="isToggle.set(!isToggle())"
      >
        @for (item of play.cards; track $index; let i = $index) {
          <card-component [index]="i" [card]="item" [isToggle]="isToggle()" />
        }
      </div>
    }
  </div>
</div>

@if (isWinner()) {
  <app-toast
    [player]="players().at(0)?.winner ?? false"
    [computer]="players().at(COMPUTER())?.winner ?? false"
    [message]="message()"
  />
}
